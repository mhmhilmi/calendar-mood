services:
  db:
    image: postgres:16-alpine
    container_name: blocalm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blocalm
      POSTGRES_PASSWORD: blocalm_dev_password
      POSTGRES_DB: blocalm
    ports:
      - "5432:5432"
    volumes:
      - blocalm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blocalm -d blocalm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: blocalm-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://blocalm:blocalm_dev_password@db:5432/blocalm
      AUTH_SECRET: change-me-in-real-development
      ACCESS_TOKEN_TTL_MINUTES: "60"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  blocalm_postgres_data:

